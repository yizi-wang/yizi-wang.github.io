<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Grid circles -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="#ddd" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#ddd" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#ddd" stroke-width="0.8"/>
  <!-- Grid rays -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#ddd" stroke-width="0.8"/>
  <line x1="200" y1="50" x2="200" y2="350" stroke="#ddd" stroke-width="0.8"/>
  <line x1="70" y1="70" x2="330" y2="330" stroke="#ddd" stroke-width="0.8"/>
  <line x1="330" y1="70" x2="70" y2="330" stroke="#ddd" stroke-width="0.8"/>
  <!-- Axes -->
  <line x1="30" y1="200" x2="370" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="30" x2="200" y2="370" stroke="black" stroke-width="1.5"/>
  <polygon points="370,200 360,195 360,205" fill="black"/>
  <polygon points="200,30 195,40 205,40" fill="black"/>
  <text x="372" y="205" font-size="13" font-style="italic">x</text>
  <text x="205" y="25" font-size="13" font-style="italic">y</text>
  <!-- Point P -->
  <line x1="200" y1="200" x2="290" y2="85" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="290" cy="85" r="4" fill="#e74c3c"/>
  <text x="295" y="80" font-size="14" fill="#e74c3c" font-weight="bold">P(r, θ)</text>
  <!-- Angle arc -->
  <path d="M250,200 A50,50 0 0,0 225,160" fill="none" stroke="#3498db" stroke-width="2"/>
  <text x="255" y="165" font-size="13" fill="#3498db" font-style="italic">θ</text>
  <!-- r label -->
  <text x="235" y="130" font-size="13" fill="#e74c3c" font-style="italic" transform="rotate(-50,235,130)">r</text>
  <!-- Origin -->
  <circle cx="200" cy="200" r="3" fill="black"/>
  <text x="190" y="218" font-size="12">O</text>
</svg>