<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1 -1 7 5" width="600" height="350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Chain segment -->
  <line x1="0.5" y1="1" x2="2" y2="2" stroke="red" stroke-width="0.08"/>
  <!-- Weight -->
  <line x1="1.25" y1="1.5" x2="1.25" y2="0.3" stroke="purple" stroke-width="0.04" marker-end="url(#arrowP2)"/>
  <text x="1.3" y="0.2" fill="purple" font-size="0.3">ρsg</text>
  <!-- Horizontal tension Th -->
  <line x1="1.25" y1="1.5" x2="-0.25" y2="1.5" stroke="olive" stroke-width="0.04" marker-end="url(#arrowO2)"/>
  <text x="-0.7" y="1.45" fill="olive" font-size="0.3">T_h</text>
  <!-- Total tension T -->
  <line x1="1.25" y1="1.5" x2="2.75" y2="2.5" stroke="green" stroke-width="0.04" marker-end="url(#arrowG2)"/>
  <text x="2.85" y="2.55" fill="green" font-size="0.3">T</text>
  <!-- Angle theta -->
  <path d="M1.55,1.5 A0.3,0.3 0 0,1 1.47,1.78" fill="none" stroke="black" stroke-width="0.02"/>
  <text x="1.65" y="1.75" font-size="0.25">θ</text>
  <!-- Dotted line -->
  <line x1="1.25" y1="1.5" x2="2.25" y2="1.5" stroke="#999" stroke-width="0.02" stroke-dasharray="0.05,0.05"/>
  <!-- Legend -->
  <text x="3.5" y="1.2" fill="purple" font-size="0.25">ρsg: gravity</text>
  <text x="3.5" y="1.6" fill="olive" font-size="0.25">T_h: horizontal tension</text>
  <text x="3.5" y="2.0" fill="green" font-size="0.25">T: total tension</text>
  <defs>
    <marker id="arrowG2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="green"/></marker>
    <marker id="arrowO2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="olive"/></marker>
    <marker id="arrowP2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="purple"/></marker>
  </defs>
</svg>
