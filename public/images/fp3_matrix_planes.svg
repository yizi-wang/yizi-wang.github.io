<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- 3D axes -->
  <line x1="50" y1="300" x2="350" y2="300" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="50" y1="300" x2="50" y2="30" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="50" y1="300" x2="20" y2="330" stroke="black" stroke-width="1"/>
  <text x="355" y="305" font-size="14" font-style="italic">x</text>
  <text x="38" y="22" font-size="14" font-style="italic">y</text>
  <!-- Plane 1: blue -->
  <polygon points="80,100 300,80 280,280 60,300" fill="blue" fill-opacity="0.2" stroke="blue" stroke-width="1.5"/>
  <text x="250" y="70" font-size="13" fill="blue">Plane 1</text>
  <!-- Plane 2: red -->
  <polygon points="120,60 320,120 300,310 100,250" fill="red" fill-opacity="0.2" stroke="red" stroke-width="1.5"/>
  <text x="300" y="130" font-size="13" fill="red">Plane 2</text>
  <!-- Plane 3: green -->
  <polygon points="60,150 260,50 300,250 100,310" fill="green" fill-opacity="0.15" stroke="green" stroke-width="1.5"/>
  <text x="240" y="55" font-size="13" fill="green">Plane 3</text>
  <!-- Intersection point -->
  <circle cx="180" cy="180" r="5" fill="black"/>
  <text x="190" y="175" font-size="13" font-weight="bold">Intersection</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>
