<svg xmlns="http://www.w3.org/2000/svg" width="450" height="380" viewBox="0 0 450 380">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Back faces -->
  <polygon points="100,80 200,40 250,70 150,110" fill="blue" fill-opacity="0.1" stroke="blue" stroke-width="1"/>
  <polygon points="200,40 300,80 250,70" fill="red" fill-opacity="0.05" stroke="red" stroke-width="1"/>
  <polygon points="250,70 300,80 350,250 300,220" fill="green" fill-opacity="0.05" stroke="green" stroke-width="1"/>
  <!-- Front faces -->
  <polygon points="100,80 200,120 300,80 200,40" fill="blue" fill-opacity="0.2" stroke="blue" stroke-width="2"/>
  <polygon points="100,80 100,250 200,290 200,120" fill="red" fill-opacity="0.15" stroke="red" stroke-width="2"/>
  <polygon points="200,120 200,290 300,250 300,80" fill="green" fill-opacity="0.1" stroke="green" stroke-width="2"/>
  <!-- Top face -->
  <polygon points="100,250 200,290 300,250 200,210" fill="purple" fill-opacity="0.1" stroke="purple" stroke-width="1.5"/>
  <!-- Vectors from origin -->
  <line x1="100" y1="280" x2="200" y2="240" stroke="blue" stroke-width="3" marker-end="url(#arrowV)"/>
  <text x="160" y="272" font-size="14" fill="blue" font-weight="bold">a⃗</text>
  <line x1="100" y1="280" x2="40" y2="110" stroke="red" stroke-width="3" marker-end="url(#arrowV)"/>
  <text x="55" y="200" font-size="14" fill="red" font-weight="bold">b⃗</text>
  <line x1="100" y1="280" x2="250" y2="350" stroke="green" stroke-width="3" marker-end="url(#arrowV)"/>
  <text x="190" y="335" font-size="14" fill="green" font-weight="bold">c⃗</text>
  <!-- Origin dot -->
  <circle cx="100" cy="280" r="4" fill="black"/>
  <!-- Label -->
  <text x="120" y="365" font-size="15" font-weight="bold">Volume = |det(A)|</text>
  <defs>
    <marker id="arrowV" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>
