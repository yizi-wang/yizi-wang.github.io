<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Coordinate axes -->
  <line x1="200" y1="350" x2="200" y2="50" stroke="black" stroke-width="1"/>
  <line x1="50" y1="200" x2="350" y2="200" stroke="black" stroke-width="1"/>
  <line x1="100" y1="350" x2="350" y2="100" stroke="black" stroke-width="0.5" stroke-dasharray="4,4" stroke="#999"/>
  
  <!-- Axes labels -->
  <text x="355" y="205" font-size="14" font-style="italic">x</text>
  <text x="195" y="45" font-size="14" font-style="italic">y</text>
  <text x="345" y="95" font-size="14" font-style="italic">z</text>
  
  <!-- Parallelogram (shaded) -->
  <polygon points="200,200 300,170 360,110 260,140" fill="#e0e8ff" opacity="0.4" stroke="none"/>
  
  <!-- Vector a -->
  <line x1="200" y1="200" x2="300" y2="170" stroke="blue" stroke-width="2.5"/>
  <polygon points="300,170 293,175 295,167" fill="blue"/>
  <text x="245" y="197" font-size="14" fill="blue" font-weight="bold">a</text>
  
  <!-- Vector b -->
  <line x1="200" y1="200" x2="260" y2="140" stroke="red" stroke-width="2.5"/>
  <polygon points="260,140 255,148 263,148" fill="red"/>
  <text x="225" y="165" font-size="14" fill="red" font-weight="bold">b</text>
  
  <!-- Vector a×b (perpendicular, pointing up) -->
  <line x1="200" y1="200" x2="200" y2="70" stroke="#2d8a2d" stroke-width="2.5"/>
  <polygon points="200,70 195,80 205,80" fill="#2d8a2d"/>
  <text x="205" y="130" font-size="14" fill="#2d8a2d" font-weight="bold">a × b</text>
  
  <!-- Right-hand rule arc -->
  <path d="M 260,180 A 50 50 0 0 0 240,150" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="265" y="165" font-size="11" fill="#666">right-hand rule</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>