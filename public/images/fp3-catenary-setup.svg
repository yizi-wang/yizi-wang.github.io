<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -1 8 7" width="600" height="400">
  <rect width="100%" height="100%" fill="white"/>
  <line x1="-4" y1="0" x2="4" y2="0" stroke="#333" stroke-width="0.02"/>
  <line x1="0" y1="-1" x2="0" y2="6.5" stroke="#333" stroke-width="0.02"/>
  <!-- Catenary curve -->
  <path d="M-3,3.3 Q-2,2.1 -1,1.54 0,1.5 1,1.54 2,2.1 3,3.3" fill="none" stroke="blue" stroke-width="0.04"/>
  <!-- Arc length s from bottom -->
  <path d="M0,1.5 Q0.5,1.5 1,1.54" fill="none" stroke="red" stroke-width="0.06"/>
  <text x="0.4" y="1.7" fill="red" font-size="0.3">s</text>
  <!-- Point P -->
  <circle cx="1" cy="1.54" r="0.06" fill="black"/>
  <text x="1.1" y="1.75" font-size="0.3">P(x,y)</text>
  <!-- Tension T -->
  <line x1="1" y1="1.54" x2="2" y2="2.8" stroke="green" stroke-width="0.04" marker-end="url(#arrowG)"/>
  <text x="2.1" y="2.9" fill="green" font-size="0.3">T</text>
  <!-- Horizontal tension Th -->
  <line x1="0" y1="1.5" x2="-1" y2="1.5" stroke="olive" stroke-width="0.04" marker-end="url(#arrowO)"/>
  <text x="-1.4" y="1.45" fill="olive" font-size="0.3">T_h</text>
  <!-- Weight -->
  <line x1="0.5" y1="1.58" x2="0.5" y2="0.4" stroke="purple" stroke-width="0.04" marker-end="url(#arrowP)"/>
  <text x="0.55" y="0.3" fill="purple" font-size="0.25">mg = ρsg</text>
  <!-- Axes labels -->
  <text x="3.8" y="-0.1" fill="#333" font-size="0.3">x</text>
  <text x="0.15" y="6.3" fill="#333" font-size="0.3">y</text>
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="green"/></marker>
    <marker id="arrowO" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="olive"/></marker>
    <marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="purple"/></marker>
  </defs>
</svg>
