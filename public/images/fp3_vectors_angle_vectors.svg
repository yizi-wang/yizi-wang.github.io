<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Vector a -->
  <line x1="50" y1="150" x2="250" y2="150" stroke="blue" stroke-width="2.5"/>
  <polygon points="250,150 242,146 242,154" fill="blue"/>
  <text x="145" y="170" font-size="14" fill="blue" font-weight="bold">a</text>
  
  <!-- Vector b -->
  <line x1="50" y1="150" x2="180" y2="40" stroke="red" stroke-width="2.5"/>
  <polygon points="180,40 173,48 181,48" fill="red"/>
  <text x="105" y="90" font-size="14" fill="red" font-weight="bold">b</text>
  
  <!-- Angle arc -->
  <path d="M 120,150 A 70 70 0 0 0 95,95" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="110" y="125" font-size="14" fill="#333" font-style="italic">θ</text>
  
  <defs>
    <marker id="a6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>
