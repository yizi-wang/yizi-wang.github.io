<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Plane -->
  <polygon points="30,220 350,220 380,180 60,180" fill="#d4e6ff" opacity="0.4" stroke="black" stroke-width="1.5"/>
  
  <!-- Point P above plane -->
  <circle cx="200" cy="80" r="5" fill="red"/>
  <text x="205" y="75" font-size="14" fill="red" font-weight="bold">P</text>
  
  <!-- Foot of perpendicular L on plane -->
  <circle cx="180" cy="195" r="5" fill="blue"/>
  <text x="170" y="210" font-size="14" fill="blue" font-weight="bold">L</text>
  
  <!-- Vector from L to P (perpendicular) -->
  <line x1="180" y1="195" x2="200" y2="80" stroke="red" stroke-width="2"/>
  <polygon points="200,80 193,88 201,88" fill="red"/>
  <text x="195" y="135" font-size="12" fill="red">Distance</text>
  
  <!-- Normal vector -->
  <line x1="180" y1="195" x2="180" y2="110" stroke="#2d8a2d" stroke-width="2"/>
  <polygon points="180,110 175,120 185,120" fill="#2d8a2d"/>
  <text x="185" y="150" font-size="13" fill="#2d8a2d" font-weight="bold">n</text>
  
  <!-- Right angle mark -->
  <rect x="176" y="183" width="8" height="8" fill="none" stroke="black" stroke-width="1"/>
  
  <!-- p-r vector -->
  <line x1="180" y1="195" x2="200" y2="80" stroke="red" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="205" y="140" font-size="12" fill="red">p-r</text>
  
  <text x="15" y="225" font-size="12" fill="#333">Plane</text>
</svg>