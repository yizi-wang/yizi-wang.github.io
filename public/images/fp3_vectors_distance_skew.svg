<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Two parallel planes (one for each line) -->
  <polygon points="50,150 350,150 380,110 80,110" fill="#ffe0e0" opacity="0.3" stroke="none"/>
  <polygon points="50,250 350,250 380,210 80,210" fill="#d4e6ff" opacity="0.3" stroke="none"/>
  
  <!-- Line 1 (top) -->
  <line x1="80" y1="120" x2="350" y2="140" stroke="red" stroke-width="2.5"/>
  <polygon points="350,140 342,136 342,144" fill="red"/>
  <text x="310" y="115" font-size="13" fill="red" font-weight="bold">r = a + λb</text>
  
  <!-- Point on line 1 -->
  <circle cx="150" cy="125" r="4" fill="red"/>
  
  <!-- Line 2 (bottom) -->
  <line x1="80" y1="230" x2="350" y2="240" stroke="blue" stroke-width="2.5"/>
  <polygon points="350,240 342,236 342,244" fill="blue"/>
  <text x="310" y="260" font-size="13" fill="blue" font-weight="bold">r = c + μd</text>
  
  <!-- Point on line 2 -->
  <circle cx="200" cy="235" r="4" fill="blue"/>
  
  <!-- Direction vector b -->
  <line x1="150" y1="125" x2="230" y2="130" stroke="red" stroke-width="2"/>
  <polygon points="230,130 222,126 222,134" fill="red"/>
  <text x="185" y="118" font-size="12" fill="red" font-weight="bold">b</text>
  
  <!-- Direction vector d -->
  <line x1="200" y1="235" x2="280" y2="238" stroke="blue" stroke-width="2"/>
  <polygon points="280,238 272,234 272,242" fill="blue"/>
  <text x="235" y="250" font-size="12" fill="blue" font-weight="bold">d</text>
  
  <!-- a-c vector -->
  <line x1="150" y1="125" x2="200" y2="235" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="200,235 196,227 204,227" fill="#8b5cf6"/>
  <text x="170" y="180" font-size="12" fill="#8b5cf6" font-weight="bold">a-c</text>
  
  <!-- b × d (perpendicular direction) -->
  <line x1="175" y1="180" x2="175" y2="130" stroke="#2d8a2d" stroke-width="2"/>
  <polygon points="175,130 170,140 180,140" fill="#2d8a2d"/>
  <text x="180" y="155" font-size="12" fill="#2d8a2d" font-weight="bold">b × d</text>
  
  <!-- Distance line -->
  <line x1="175" y1="130" x2="175" y2="235" stroke="#cc0000" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="180" y="190" font-size="13" fill="#cc0000" font-weight="bold">Distance</text>
  
  <!-- Right angle marks -->
  <rect x="171" y="126" width="8" height="8" fill="none" stroke="black" stroke-width="1"/>
  <rect x="171" y="227" width="8" height="8" fill="none" stroke="black" stroke-width="1"/>
</svg>