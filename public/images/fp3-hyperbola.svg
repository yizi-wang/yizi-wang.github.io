<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3.5 -3 7 6" width="600" height="400">
  <rect width="100%" height="100%" fill="white"/>
  <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#333" stroke-width="0.02"/>
  <line x1="0" y1="-3" x2="0" y2="3" stroke="#333" stroke-width="0.02"/>
  <!-- Hyperbola: x^2/1.44 - y^2 = 1, a=1.2 -->
  <path d="M1.2,0 L2,1.33 L2.8,2.11" fill="none" stroke="blue" stroke-width="0.04"/>
  <path d="M1.2,0 L2,-1.33 L2.8,-2.11" fill="none" stroke="blue" stroke-width="0.04"/>
  <path d="M-1.2,0 L-2,1.33 L-2.8,2.11" fill="none" stroke="blue" stroke-width="0.04"/>
  <path d="M-1.2,0 L-2,-1.33 L-2.8,-2.11" fill="none" stroke="blue" stroke-width="0.04"/>
  <!-- Asymptotes -->
  <line x1="-3" y1="-2.5" x2="3" y2="2.5" stroke="#999" stroke-width="0.02" stroke-dasharray="0.1,0.1"/>
  <line x1="-3" y1="2.5" x2="3" y2="-2.5" stroke="#999" stroke-width="0.02" stroke-dasharray="0.1,0.1"/>
  <text x="3.1" y="2.6" fill="#999" font-size="0.25">y = (b/a)x</text>
  <text x="3.1" y="-2.3" fill="#999" font-size="0.25">y = −(b/a)x</text>
  <!-- Point P -->
  <circle cx="1.5" cy="0.67" r="0.06" fill="black"/>
  <text x="1.6" y="0.85" font-size="0.28">P(a cosh t, b sinh t)</text>
  <!-- Labels -->
  <text x="1.25" y="0.2" font-size="0.3">a</text>
  <text x="-1.55" y="0.2" font-size="0.3">−a</text>
</svg>
