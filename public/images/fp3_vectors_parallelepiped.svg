<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Axes -->
  <line x1="50" y1="300" x2="350" y2="300" stroke="black" stroke-width="0.5" stroke-dasharray="4,4" stroke="#ccc"/>
  <line x1="50" y1="300" x2="50" y2="50" stroke="black" stroke-width="0.5" stroke-dasharray="4,4" stroke="#ccc"/>
  
  <!-- Parallelepiped faces -->
  <!-- Bottom face -->
  <polygon points="80,280 250,280 280,240 110,240" fill="#d4e6ff" opacity="0.4" stroke="black" stroke-width="1"/>
  <!-- Left face -->
  <polygon points="80,280 110,240 110,140 80,180" fill="#ffe0e0" opacity="0.4" stroke="black" stroke-width="1"/>
  <!-- Back face -->
  <polygon points="80,180 110,140 280,140 250,180" fill="#d4ffd4" opacity="0.3" stroke="black" stroke-width="1"/>
  <!-- Right face -->
  <polygon points="250,280 280,240 280,140 250,180" fill="#fff3d4" opacity="0.4" stroke="black" stroke-width="1"/>
  <!-- Top face -->
  <polygon points="80,180 250,180 280,140 110,140" fill="#e8d4ff" opacity="0.3" stroke="black" stroke-width="1"/>
  
  <!-- Vectors from origin -->
  <line x1="80" y1="280" x2="250" y2="280" stroke="blue" stroke-width="2.5"/>
  <polygon points="250,280 242,276 242,284" fill="blue"/>
  <text x="160" y="295" font-size="14" fill="blue" font-weight="bold">a</text>
  
  <line x1="80" y1="280" x2="110" y2="240" stroke="red" stroke-width="2.5"/>
  <polygon points="110,240 105,248 113,248" fill="red"/>
  <text x="88" y="258" font-size="14" fill="red" font-weight="bold">b</text>
  
  <line x1="80" y1="280" x2="80" y2="180" stroke="#2d8a2d" stroke-width="2.5"/>
  <polygon points="80,180 75,190 85,190" fill="#2d8a2d"/>
  <text x="60" y="230" font-size="14" fill="#2d8a2d" font-weight="bold">c</text>
  
  <text x="65" y="295" font-size="13" fill="#333">O</text>
</svg>