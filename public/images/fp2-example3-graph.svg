<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Axes -->
  <line x1="50" y1="200" x2="550" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="300" y1="30" x2="300" y2="370" stroke="black" stroke-width="1.5"/>
  <polygon points="550,200 540,195 540,205" fill="black"/>
  <polygon points="300,30 295,40 305,40" fill="black"/>
  <text x="545" y="220" font-size="14" font-family="serif">x</text>
  <text x="310" y="35" font-size="14" font-family="serif">y</text>
  <!-- Vertical asymptotes -->
  <line x1="213" y1="30" x2="213" y2="370" stroke="red" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="300" y1="30" x2="300" y2="370" stroke="red" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="200" y="45" font-size="12" fill="red" text-anchor="end">x = -4/3</text>
  <text x="310" y="45" font-size="12" fill="red">x = 0</text>
  <!-- Horizontal asymptotes -->
  <line x1="50" y1="133" x2="550" y2="133" stroke="blue" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="50" y1="267" x2="550" y2="267" stroke="blue" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="55" y="128" font-size="12" fill="blue">y = 1/3</text>
  <text x="55" y="282" font-size="12" fill="blue">y = -1/3</text>
  <!-- f(x) = x/|3x+4| curves -->
  <!-- Left branch: x < -4/3, f(x) = x/(-(3x+4)) = -x/(3x+4) -->
  <path d="M 60,267 C 100,268 150,280 190,340" stroke="blue" stroke-width="2" fill="none"/>
  <path d="M 236,60 C 240,80 245,120 250,170" stroke="blue" stroke-width="2" fill="none"/>
  <!-- Right branch: x > -4/3, f(x) = x/(3x+4) -->
  <path d="M 250,230 C 280,240 340,230 400,190 C 440,175 500,160 540,150" stroke="blue" stroke-width="2" fill="none"/>
  <!-- g(x) = 1/x curves -->
  <path d="M 80,260 C 120,245 180,220 220,190 C 250,170 270,150 285,120" stroke="#2d8a4e" stroke-width="2" fill="none"/>
  <path d="M 315,280 C 340,250 380,220 420,200 C 460,190 500,185 540,180" stroke="#2d8a4e" stroke-width="2" fill="none"/>
  <!-- Intersection points -->
  <circle cx="240" cy="200" r="4" fill="black"/>
  <text x="245" y="215" font-size="12" font-family="serif">(-1, -1)</text>
  <circle cx="430" cy="180" r="4" fill="black"/>
  <text x="435" y="175" font-size="12" font-family="serif">(4, 0.25)</text>
  <!-- Labels -->
  <text x="100" y="255" font-size="14" fill="blue" font-family="serif">f(x)</text>
  <text x="350" y="245" font-size="14" fill="#2d8a4e" font-family="serif">g(x)</text>
</svg>
