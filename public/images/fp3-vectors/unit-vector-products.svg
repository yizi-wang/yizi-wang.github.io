<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350" width="350" height="350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- 3D coordinate axes (i,j,k) -->
  <line x1="175" y1="250" x2="300" y2="250" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="175" y1="250" x2="175" y2="80" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="175" y1="250" x2="80" y2="310" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="295" y="268" font-size="14" font-style="italic" font-weight="bold">j</text>
  <text x="168" y="72" font-size="14" font-style="italic" font-weight="bold">k</text>
  <text x="62" y="315" font-size="14" font-style="italic" font-weight="bold">i</text>
  
  <!-- j × k = i (dashed red arrow) -->
  <line x1="175" y1="250" x2="110" y2="290" stroke="red" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#aR)"/>
  <text x="115" y="275" font-size="13" fill="red" font-weight="bold">j × k = i</text>
  
  <!-- Rotation arrow -->
  <path d="M 220,230 A 50 50 0 0 1 195,160" fill="none" stroke="black" stroke-width="1" marker-end="url(#a)"/>
  
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="black"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
  </defs>
</svg>
