<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 200" width="750" height="200">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Triangle OAB -->
  <text x="90" y="18" font-size="13" font-weight="bold" text-anchor="middle">Triangle OAB</text>
  <polygon points="30,150 150,110 90,50" fill="rgba(100,150,255,0.12)" stroke="black" stroke-width="1.5"/>
  <text x="25" y="165" font-size="12" font-weight="bold">O</text>
  <text x="152" y="115" font-size="12" font-weight="bold">A</text>
  <text x="88" y="42" font-size="12" font-weight="bold">B</text>
  <text x="100" y="135" font-size="11">½|a × b|</text>
  
  <!-- Triangle ABC -->
  <text x="360" y="18" font-size="13" font-weight="bold" text-anchor="middle">Triangle ABC</text>
  <polygon points="280,150 420,120 350,50" fill="rgba(255,150,100,0.12)" stroke="black" stroke-width="1.5"/>
  <text x="275" y="165" font-size="12" font-weight="bold">A</text>
  <text x="422" y="125" font-size="12" font-weight="bold">B</text>
  <text x="348" y="42" font-size="12" font-weight="bold">C</text>
  <text x="350" y="135" font-size="11">½|(b-a) × (c-a)|</text>
  
  <!-- Parallelogram -->
  <text x="630" y="18" font-size="13" font-weight="bold" text-anchor="middle">Parallelogram OABC</text>
  <polygon points="540,150 680,150 720,70 580,70" fill="rgba(100,200,100,0.12)" stroke="black" stroke-width="1.5"/>
  <text x="535" y="165" font-size="12" font-weight="bold">O</text>
  <text x="675" y="165" font-size="12" font-weight="bold">A</text>
  <text x="722" y="75" font-size="12" font-weight="bold">C</text>
  <text x="570" y="65" font-size="12" font-weight="bold">B</text>
  <text x="630" y="135" font-size="11">|a × b|</text>
</svg>
