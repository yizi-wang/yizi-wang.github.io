<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Coordinate axes -->
  <line x1="200" y1="250" x2="380" y2="250" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="250" x2="200" y2="50" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="250" x2="80" y2="320" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="265" font-size="14" font-style="italic">x</text>
  <text x="195" y="45" font-size="14" font-style="italic">y</text>
  <text x="65" y="325" font-size="14" font-style="italic">z</text>
  
  <!-- Parallelogram (filled) -->
  <polygon points="200,250 340,210 380,120 240,160" fill="rgba(150,150,200,0.15)" stroke="gray" stroke-width="0.5"/>
  <line x1="340" y1="210" x2="380" y2="120" stroke="gray" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="240" y1="160" x2="380" y2="120" stroke="gray" stroke-width="0.5" stroke-dasharray="4,3"/>
  
  <!-- Vector a -->
  <line x1="200" y1="250" x2="340" y2="210" stroke="blue" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="260" y="245" font-size="14" fill="blue" font-style="italic" font-weight="bold">a</text>
  
  <!-- Vector b -->
  <line x1="200" y1="250" x2="240" y2="160" stroke="red" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="208" y="200" font-size="14" fill="red" font-style="italic" font-weight="bold">b</text>
  
  <!-- Vector a×b (perpendicular, coming out) -->
  <line x1="200" y1="250" x2="200" y2="80" stroke="rgb(0,140,0)" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="205" y="100" font-size="14" fill="rgb(0,140,0)" font-style="italic" font-weight="bold">a × b</text>
  
  <!-- Right-hand rule arc -->
  <path d="M 280,225 A 50 50 0 0 1 230,180" fill="none" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="275" y="185" font-size="11">right-hand rule</text>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="black"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="blue"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="rgb(0,140,0)"/></marker>
  </defs>
</svg>
