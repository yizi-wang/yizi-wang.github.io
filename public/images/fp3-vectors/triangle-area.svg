<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" width="350" height="300">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Axes -->
  <line x1="50" y1="250" x2="330" y2="250" stroke="black" stroke-width="1" marker-end="url(#a)"/>
  <line x1="50" y1="250" x2="50" y2="30" stroke="black" stroke-width="1" marker-end="url(#a)"/>
  <text x="325" y="268" font-size="13" font-style="italic">x</text>
  <text x="42" y="28" font-size="13" font-style="italic">y</text>
  
  <!-- Triangle -->
  <polygon points="50,250 240,210 120,100" fill="rgba(100,150,255,0.12)" stroke="black" stroke-width="1.5"/>
  
  <!-- Vector a -->
  <line x1="50" y1="250" x2="240" y2="210" stroke="blue" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="150" y="245" font-size="14" fill="blue" font-style="italic" font-weight="bold">a</text>
  
  <!-- Vector b -->
  <line x1="50" y1="250" x2="120" y2="100" stroke="red" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="70" y="175" font-size="14" fill="red" font-style="italic" font-weight="bold">b</text>
  
  <!-- Labels -->
  <text x="40" y="268" font-size="14" font-weight="bold">O</text>
  <text x="245" y="215" font-size="14" font-weight="bold">A</text>
  <text x="125" y="95" font-size="14" font-weight="bold">B</text>
  
  <!-- Area label -->
  <text x="170" y="175" font-size="13">Area = ½|a × b|</text>
  
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="black"/></marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="blue"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
  </defs>
</svg>
