  <line x1="175" y1="280" x2="80" y2="200" stroke="red" stroke-width="2.5" marker-end="url(#aR)"/>
  <line x1="175" y1="280" x2="200" y2="100" stroke="rgb(0,140,0)" stroke-width="2.5" marker-end="url(#aG)"/>
  
  <text x="245" y="260" font-size="14" fill="blue" font-style="italic" font-weight="bold">a</text>
  <text x="110" y="250" font-size="14" fill="red" font-style="italic" font-weight="bold">b</text>
  <text x="195" y="190" font-size="14" fill="rgb(0,140,0)" font-style="italic" font-weight="bold">c</text>
  <text x="165" y="298" font-size="14" font-weight="bold">O</text>
  
  <defs>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="blue"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="rgb(0,140,0)"/></marker>
