<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350" width="350" height="350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Faces -->
  <polygon points="175,280 300,220 200,100" fill="rgba(100,150,255,0.1)" stroke="black" stroke-width="1"/>
  <polygon points="175,280 80,200 200,100" fill="rgba(100,200,100,0.1)" stroke="black" stroke-width="1"/>
  <polygon points="175,280 300,220 80,200" fill="rgba(255,150,100,0.08)" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="300,220 80,200 200,100" fill="rgba(200,200,100,0.1)" stroke="black" stroke-width="1"/>
  
  <!-- Vectors -->
