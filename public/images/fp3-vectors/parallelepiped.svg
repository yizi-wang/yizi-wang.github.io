<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 350" width="450" height="350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Back faces -->
  <polygon points="150,80 350,40 400,160 200,200" fill="rgba(100,150,255,0.08)" stroke="gray" stroke-width="0.8"/>
  <polygon points="150,80 150,200 200,200 200,80" fill="rgba(200,100,100,0.08)" stroke="gray" stroke-width="0.8"/>
  <polygon points="200,200 400,160 400,280 200,320" fill="rgba(100,200,100,0.08)" stroke="gray" stroke-width="0.8"/>
  
  <!-- Visible faces -->
  <polygon points="150,80 350,40 400,160 200,200" fill="rgba(100,150,255,0.15)" stroke="black" stroke-width="1"/>
  <polygon points="150,80 150,200 200,200 200,80" fill="rgba(200,100,100,0.15)" stroke="black" stroke-width="1"/>
  <polygon points="150,200 200,200 400,160 350,160" fill="rgba(100,200,100,0.1)" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="200,80 400,40 400,160 200,200" fill="none" stroke="gray" stroke-width="0.8" stroke-dasharray="4,3"/>
  <polygon points="150,80 350,40 350,160 150,200" fill="none" stroke="gray" stroke-width="0.8" stroke-dasharray="4,3"/>
  
  <!-- Edge lines -->
  <line x1="150" y1="80" x2="350" y2="40" stroke="black" stroke-width="1"/>
  <line x1="350" y1="40" x2="400" y2="160" stroke="black" stroke-width="1"/>
  <line x1="150" y1="80" x2="150" y2="200" stroke="black" stroke-width="1"/>
  <line x1="200" y1="80" x2="400" y2="40" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="80" x2="200" y2="200" stroke="black" stroke-width="1"/>
  <line x1="200" y1="200" x2="400" y2="160" stroke="black" stroke-width="1"/>
  <line x1="150" y1="200" x2="200" y2="200" stroke="black" stroke-width="1"/>
  
  <!-- Vectors from O -->
  <line x1="150" y1="200" x2="350" y2="160" stroke="blue" stroke-width="2.5" marker-end="url(#aB)"/>
  <line x1="150" y1="200" x2="200" y2="80" stroke="red" stroke-width="2.5" marker-end="url(#aR)"/>
  <line x1="150" y1="200" x2="100" y2="100" stroke="rgb(0,140,0)" stroke-width="2.5" marker-end="url(#aG)"/>
  
  <!-- Labels -->
  <text x="260" y="195" font-size="14" fill="blue" font-style="italic" font-weight="bold">a</text>
  <text x="160" y="135" font-size="14" fill="red" font-style="italic" font-weight="bold">b</text>
  <text x="105" y="140" font-size="14" fill="rgb(0,140,0)" font-style="italic" font-weight="bold">c</text>
  <text x="138" y="215" font-size="14" font-weight="bold">O</text>
  
  <defs>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="blue"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="rgb(0,140,0)"/></marker>
  </defs>
</svg>
