<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Two parallel planes (for visualization) -->
  <polygon points="50,100 350,100 300,50 100,50" fill="rgba(100,150,255,0.08)" stroke="gray" stroke-width="0.5"/>
  <polygon points="50,280 350,280 300,230 100,230" fill="rgba(255,100,100,0.08)" stroke="gray" stroke-width="0.5"/>
  
  <!-- Line 1 (top plane) -->
  <line x1="80" y1="65" x2="320" y2="85" stroke="red" stroke-width="2" marker-end="url(#aR)"/>
  <text x="280" y="72" font-size="13" fill="red" font-style="italic" font-weight="bold">b</text>
  
  <!-- Line 2 (bottom plane) -->
  <line x1="100" y1="270" x2="300" y2="250" stroke="blue" stroke-width="2" marker-end="url(#aB)"/>
  <text x="280" y="245" font-size="13" fill="blue" font-style="italic" font-weight="bold">d</text>
  
  <!-- Point on line 1 -->
  <circle cx="150" cy="70" r="3" fill="red"/>
  <text x="155" y="62" font-size="13" font-weight="bold">A (a)</text>
  
  <!-- Point on line 2 -->
  <circle cx="175" cy="265" r="3" fill="blue"/>
  <text x="180" y="280" font-size="13" font-weight="bold">C (c)</text>
  
  <!-- a-c vector -->
  <line x1="175" y1="265" x2="150" y2="75" stroke="orange" stroke-width="2" marker-end="url(#aO)"/>
  <text x="145" y="170" font-size="12" fill="orange" font-style="italic">a-c</text>
  
  <!-- Distance (perpendicular) -->
  <line x1="200" y1="95" x2="200" y2="255" stroke="rgb(0,140,0)" stroke-width="2.5" marker-end="url(#aG)"/>
  <text x="208" y="180" font-size="12" fill="rgb(0,140,0)" font-weight="bold">Distance</text>
  
  <!-- b × d direction -->
  <line x1="200" y1="255" x2="200" y2="220" stroke="purple" stroke-width="2" marker-end="url(#aP)"/>
  <text x="208" y="228" font-size="11" fill="purple" font-style="italic">b × d</text>
  
  <!-- Right angle marks -->
  <rect x="200" y="88" width="6" height="6" fill="none" stroke="black" stroke-width="0.8"/>
  <rect x="200" y="249" width="6" height="6" fill="none" stroke="black" stroke-width="0.8"/>
  
  <defs>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="blue"/></marker>
    <marker id="aO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="orange"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="rgb(0,140,0)"/></marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="purple"/></marker>
  </defs>
</svg>
