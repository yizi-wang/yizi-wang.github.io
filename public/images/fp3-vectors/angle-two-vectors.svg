<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Vectors -->
  <line x1="50" y1="150" x2="250" y2="150" stroke="blue" stroke-width="2.5" marker-end="url(#aB)"/>
  <text x="160" y="170" font-size="14" fill="blue" font-style="italic" font-weight="bold">a</text>
  <line x1="50" y1="150" x2="200" y2="50" stroke="red" stroke-width="2.5" marker-end="url(#aR)"/>
  <text x="130" y="85" font-size="14" fill="red" font-style="italic" font-weight="bold">b</text>
  <!-- Angle arc -->
  <path d="M 120,150 A 70 70 0 0 1 100,100" fill="none" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="130" y="120" font-size="14" font-style="italic">θ</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="black"/></marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="blue"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
  </defs>
</svg>
