<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Plane 1 (horizontal-ish, red tint) -->
  <polygon points="50,200 350,200 300,100 100,100" fill="rgba(255,100,100,0.1)" stroke="red" stroke-width="1"/>
  <!-- Plane 2 (angled, blue tint) -->
  <polygon points="50,200 200,280 200,150 100,100" fill="rgba(100,150,255,0.1)" stroke="blue" stroke-width="1"/>
  
  <!-- Line of intersection -->
  <line x1="100" y1="100" x2="200" y2="200" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  
  <!-- Normal 1 (from intersection line) -->
  <line x1="150" y1="150" x2="300" y2="100" stroke="red" stroke-width="2" marker-end="url(#aR)"/>
  <text x="300" y="95" font-size="13" fill="red" font-style="italic" font-weight="bold">n₁</text>
  
  <!-- Normal 2 (from intersection line) -->
  <line x1="150" y1="150" x2="80" y2="250" stroke="blue" stroke-width="2" marker-end="url(#aB)"/>
  <text x="60" y="255" font-size="13" fill="blue" font-style="italic" font-weight="bold">n₂</text>
  
  <!-- Angle between normals -->
  <path d="M 220,130 A 80 80 0 0 1 120,195" fill="none" stroke="rgb(0,140,0)" stroke-width="1.5"/>
  <text x="185" y="185" font-size="14" fill="rgb(0,140,0)" font-style="italic">θ</text>
  
  <defs>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="blue"/></marker>
  </defs>
</svg>
