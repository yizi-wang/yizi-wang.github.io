<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Axes -->
  <line x1="60" y1="200" x2="380" y2="200" stroke="black" stroke-width="1" marker-end="url(#a)"/>
  <line x1="60" y1="200" x2="60" y2="20" stroke="black" stroke-width="1" marker-end="url(#a)"/>
  <text x="375" y="218" font-size="12" font-style="italic">x</text>
  <text x="52" y="18" font-size="12" font-style="italic">y</text>
  
  <!-- Line -->
  <line x1="20" y1="160" x2="380" y2="100" stroke="blue" stroke-width="1.5"/>
  <text x="350" y="90" font-size="12" fill="blue">r = a + λb</text>
  
  <!-- Point A on line -->
  <circle cx="120" cy="148" r="3" fill="purple"/>
  <text x="110" y="140" font-size="13" font-weight="bold">A</text>
  
  <!-- Position vector a -->
  <line x1="60" y1="200" x2="120" y2="148" stroke="purple" stroke-width="2" marker-end="url(#aP)"/>
  <text x="75" y="180" font-size="13" fill="purple" font-style="italic" font-weight="bold">a</text>
  
  <!-- Point P -->
  <circle cx="280" cy="60" r="3" fill="rgb(0,140,0)"/>
  <text x="285" y="58" font-size="13" font-weight="bold">P</text>
  
  <!-- Position vector p -->
  <line x1="60" y1="200" x2="280" y2="60" stroke="rgb(0,140,0)" stroke-width="2" marker-end="url(#aG)"/>
  <text x="165" y="145" font-size="13" fill="rgb(0,140,0)" font-style="italic" font-weight="bold">p</text>
  
  <!-- p-a vector -->
  <line x1="120" y1="148" x2="280" y2="60" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="195" y="95" font-size="12" font-style="italic">p-a</text>
  
  <!-- Direction vector b -->
  <line x1="120" y1="148" x2="200" y2="120" stroke="red" stroke-width="2" marker-end="url(#aR)"/>
  <text x="160" y="138" font-size="13" fill="red" font-style="italic" font-weight="bold">b</text>
  
  <!-- Perpendicular distance (dashed) -->
  <line x1="225" y1="115" x2="280" y2="60" stroke="gray" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="260" y="95" font-size="11">Distance</text>
  
  <!-- Angle θ -->
  <path d="M 165,140 A 40 40 0 0 1 150,115" fill="rgba(200,100,100,0.3)" stroke="black" stroke-width="1"/>
  <text x="168" y="120" font-size="13" fill="red" font-style="italic">θ</text>
  
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="black"/></marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="purple"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="rgb(0,140,0)"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
  </defs>
</svg>
