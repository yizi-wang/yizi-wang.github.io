<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" width="350" height="300">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Plane -->
  <polygon points="20,200 330,200 300,120 50,120" fill="rgba(100,150,255,0.12)" stroke="black" stroke-width="1.5"/>
  
  <!-- Line (entering plane) -->
  <line x1="80" y1="280" x2="170" y2="155" stroke="red" stroke-width="2" marker-end="url(#aR)"/>
  <line x1="170" y1="155" x2="260" y2="90" stroke="red" stroke-width="2" marker-end="url(#aR)"/>
  <line x1="170" y1="155" x2="170" y2="80" stroke="rgb(0,140,0)" stroke-width="2" marker-end="url(#aG)"/>
  <text x="175" y="80" font-size="13" fill="rgb(0,140,0)" font-style="italic" font-weight="bold">n</text>
  <text x="240" y="85" font-size="13" fill="red" font-style="italic" font-weight="bold">b</text>
  
  <!-- Angle θ (between line and plane) -->
  <path d="M 210,165 A 40 40 0 0 0 190,185" fill="rgba(0,140,0,0.3)" stroke="black" stroke-width="1"/>
  <text x="215" y="185" font-size="13" fill="rgb(0,140,0)" font-style="italic">θ</text>
  
  <!-- Angle α (between line and normal) -->
  <path d="M 170,115 A 40 40 0 0 1 195,135" fill="rgba(255,100,100,0.3)" stroke="black" stroke-width="1"/>
  <text x="190" y="120" font-size="13" fill="red" font-style="italic">α</text>
  
  <!-- Dashed horizontal -->
  <line x1="130" y1="155" x2="260" y2="155" stroke="blue" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Right angle mark -->
  <rect x="170" y="145" width="8" height="8" fill="none" stroke="black" stroke-width="0.8"/>
  
  <defs>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="red"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="rgb(0,140,0)"/></marker>
  </defs>
</svg>
