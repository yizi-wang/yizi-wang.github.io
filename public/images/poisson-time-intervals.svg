  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Bottom text -->
  <text x="350" y="265" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">As intervals get smaller: n → ∞, p → 0, but np = λ = 10</text>
  <text x="350" y="280" text-anchor="middle" font-size="13" fill="#666">This is the Poisson limit — continuous time, discrete events</text>
