<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Axes -->
  <line x1="50" y1="350" x2="450" y2="350" stroke="black" stroke-width="1.5"/>
  <line x1="250" y1="380" x2="250" y2="20" stroke="black" stroke-width="1.5"/>
  <!-- Arrowheads -->
  <polygon points="450,350 440,345 440,355" fill="black"/>
  <polygon points="250,20 245,30 255,30" fill="black"/>
  <!-- Labels -->
  <text x="460" y="355" font-size="14" font-style="italic">x</text>
  <text x="255" y="15" font-size="14" font-style="italic">y</text>
  <text x="245" y="370" font-size="12">O</text>
  <!-- Tick marks -->
  <line x1="300" y1="345" x2="300" y2="355" stroke="black" stroke-width="1"/>
  <line x1="350" y1="345" x2="350" y2="355" stroke="black" stroke-width="1"/>
  <line x1="400" y1="345" x2="400" y2="355" stroke="black" stroke-width="1"/>
  <line x1="200" y1="345" x2="200" y2="355" stroke="black" stroke-width="1"/>
  <line x1="150" y1="345" x2="150" y2="355" stroke="black" stroke-width="1"/>
  <line x1="100" y1="345" x2="100" y2="355" stroke="black" stroke-width="1"/>
  <text x="295" y="370" font-size="11">1</text>
  <text x="345" y="370" font-size="11">2</text>
  <text x="195" y="370" font-size="11">-1</text>
  <!-- f(x) = e^x (blue) -->
  <path d="M100,315 C150,310 200,300 250,280 C300,250 350,200 400,120 C410,100 420,80 430,65" stroke="blue" stroke-width="2.5" fill="none"/>
  <text x="435" y="62" font-size="13" fill="blue" font-weight="bold">f(x)=eˣ</text>
  <!-- P0(x) = 1 (red) -->
  <line x1="100" y1="280" x2="430" y2="280" stroke="red" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="435" y="284" font-size="12" fill="red">P₀=1</text>
  <!-- P1(x) = 1+x (green) -->
  <line x1="100" y1="350" x2="430" y2="150" stroke="#228B22" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="435" y="148" font-size="12" fill="#228B22">P₁</text>
  <!-- P2(x) = 1+x+x²/2 (purple) -->
  <path d="M100,320 C150,325 200,315 250,290 C300,260 350,215 400,160" stroke="purple" stroke-width="1.5" fill="none"/>
  <text x="405" y="155" font-size="12" fill="purple">P₂</text>
</svg>