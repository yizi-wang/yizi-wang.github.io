<svg xmlns="http://www.w3.org/2000/svg" viewBox="-0.5 -0.5 3 2.5" width="400" height="300">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Right triangle -->
  <line x1="0" y1="0" x2="2" y2="0" stroke="black" stroke-width="0.03"/>
  <line x1="2" y1="0" x2="2" y2="1.5" stroke="black" stroke-width="0.03"/>
  <line x1="0" y1="0" x2="2" y2="1.5" stroke="red" stroke-width="0.05"/>
  <!-- Labels -->
  <text x="2.05" y="0.8" font-size="0.25">dy</text>
  <text x="0.9" y="-0.1" font-size="0.25">dx</text>
  <text x="0.8" y="0.95" fill="red" font-size="0.25">ds</text>
  <!-- Angle theta -->
  <path d="M0.4,0 A0.4,0.4 0 0,1 0.32,0.24" fill="none" stroke="black" stroke-width="0.02"/>
  <text x="0.55" y="0.2" font-size="0.2">θ</text>
  <!-- Right angle marker -->
  <line x1="1.85" y1="0" x2="1.85" y2="0.15" stroke="black" stroke-width="0.02"/>
  <line x1="2" y1="0.15" x2="1.85" y2="0.15" stroke="black" stroke-width="0.02"/>
</svg>
