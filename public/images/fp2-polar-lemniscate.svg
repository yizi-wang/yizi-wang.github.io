<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Grid -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="#eee" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#eee" stroke-width="0.8"/>
  <!-- Axes -->
  <line x1="30" y1="200" x2="370" y2="200" stroke="black" stroke-width="1.2"/>
  <line x1="200" y1="30" x2="200" y2="370" stroke="black" stroke-width="1.2"/>
  <text x="372" y="205" font-size="12" font-style="italic">x</text>
  <text x="205" y="25" font-size="12" font-style="italic">y</text>
  <!-- Lemniscate r²=a²cos(2θ), a=80 -->
  <!-- Right loop: θ ∈ [-π/4, π/4], symmetric about x-axis -->
  <path d="M200,200 C220,180 260,170 280,200 C260,230 220,220 200,200 Z" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <!-- Left loop: θ ∈ [3π/4, 5π/4] -->
  <path d="M200,200 C180,180 140,170 120,200 C140,230 180,220 200,200 Z" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <!-- Intersection at origin -->
  <circle cx="200" cy="200" r="3" fill="black"/>
  <text x="190" y="218" font-size="11">O</text>
  <!-- Loop endpoints -->
  <circle cx="280" cy="200" r="3" fill="#e74c3c"/>
  <circle cx="120" cy="200" r="3" fill="#3498db"/>
  <!-- Labels -->
  <text x="283" y="195" font-size="11" fill="#e74c3c">a</text>
  <text x="105" y="195" font-size="11" fill="#3498db">a</text>
  <text x="220" y="155" font-size="13" fill="#e74c3c" font-weight="bold">r²=a²cos 2θ</text>
</svg>