<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3.5 -2.5 7 5" width="600" height="400">
  <rect width="100%" height="100%" fill="white"/>
  <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#333" stroke-width="0.02"/>
  <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#333" stroke-width="0.02"/>
  <!-- Ellipse: x^2/4 + y^2/1.44 = 1, a=2, b=1.2 -->
  <ellipse cx="0" cy="0" rx="2" ry="1.2" fill="none" stroke="blue" stroke-width="0.04"/>
  <!-- Point P -->
  <circle cx="1.2" cy="0.72" r="0.06" fill="black"/>
  <text x="1.3" y="0.9" font-size="0.3">P(a cos t, b sin t)</text>
  <!-- Labels -->
  <text x="2.05" y="0.2" font-size="0.3">a</text>
  <text x="-2.35" y="0.2" font-size="0.3">−a</text>
  <text x="0.15" y="1.35" font-size="0.3">b</text>
  <text x="0.15" y="-1.1" font-size="0.3">−b</text>
</svg>
