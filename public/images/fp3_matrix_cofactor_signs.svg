<svg xmlns="http://www.w3.org/2000/svg" width="600" height="250" viewBox="0 0 600 250">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Minor M22 matrix -->
  <rect x="30" y="40" width="180" height="120" fill="none" stroke="black" stroke-width="2"/>
  <rect x="30" y="40" width="180" height="120" fill="none" stroke="black" stroke-width="2" style="border-left:3px solid black"/>
  <line x1="33" y1="40" x2="33" y2="160" stroke="black" stroke-width="3"/>
  <line x1="207" y1="40" x2="207" y2="160" stroke="black" stroke-width="3"/>
  <!-- Grid lines -->
  <line x1="30" y1="80" x2="210" y2="80" stroke="black" stroke-width="0.5"/>
  <line x1="30" y1="120" x2="210" y2="120" stroke="black" stroke-width="0.5"/>
  <line x1="90" y1="40" x2="90" y2="160" stroke="black" stroke-width="0.5"/>
  <line x1="150" y1="40" x2="150" y2="160" stroke="black" stroke-width="0.5"/>
  <!-- Entries -->
  <text x="50" y="68" font-size="18" font-style="italic">a₁₁</text>
  <text x="110" y="68" font-size="16" fill="gray">×</text>
  <text x="165" y="68" font-size="18" font-style="italic">a₁₃</text>
  <text x="50" y="108" font-size="16" fill="gray">×</text>
  <text x="110" y="108" font-size="16" fill="gray">×</text>
  <text x="165" y="108" font-size="16" fill="gray">×</text>
  <text x="50" y="148" font-size="18" font-style="italic">a₃₁</text>
  <text x="110" y="148" font-size="16" fill="gray">×</text>
  <text x="165" y="148" font-size="18" font-style="italic">a₃₃</text>
  <!-- Label -->
  <text x="30" y="200" font-size="15" font-weight="bold">Minor M₂₂ = |a₁₁  a₁₃|</text>
  <text x="118" y="218" font-size="15" font-weight="bold">|a₃₁  a₃₃|</text>
  <text x="30" y="245" font-size="15">Cofactor C₂₂ = (-1)²⁺² M₂₂ = M₂₂</text>
  <!-- Signs matrix -->
  <g transform="translate(350, 40)">
    <rect x="0" y="0" width="150" height="120" fill="none" stroke="black" stroke-width="2"/>
    <line x1="0" y1="40" x2="150" y2="40" stroke="black" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="150" y2="80" stroke="black" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="120" stroke="black" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="120" stroke="black" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="black" stroke-width="3"/>
    <line x1="150" y1="0" x2="150" y2="120" stroke="black" stroke-width="3"/>
    <text x="18" y="28" font-size="22" fill="green" font-weight="bold">+</text>
    <text x="68" y="28" font-size="22" fill="red" font-weight="bold">−</text>
    <text x="118" y="28" font-size="22" fill="green" font-weight="bold">+</text>
    <text x="18" y="68" font-size="22" fill="red" font-weight="bold">−</text>
    <text x="68" y="68" font-size="22" fill="green" font-weight="bold">+</text>
    <text x="118" y="68" font-size="22" fill="red" font-weight="bold">−</text>
    <text x="18" y="108" font-size="22" fill="green" font-weight="bold">+</text>
    <text x="68" y="108" font-size="22" fill="red" font-weight="bold">−</text>
    <text x="118" y="108" font-size="22" fill="green" font-weight="bold">+</text>
    <text x="15" y="150" font-size="15" font-weight="bold">Signs of cofactors</text>
  </g>
</svg>
