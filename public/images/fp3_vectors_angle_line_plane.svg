<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Plane -->
  <polygon points="30,220 350,220 380,180 60,180" fill="#d4e6ff" opacity="0.4" stroke="black" stroke-width="1.5"/>
  
  <!-- Line (going through plane) -->
  <line x1="180" y1="280" x2="300" y2="60" stroke="red" stroke-width="2.5"/>
  <polygon points="300,60 291,68 299,68" fill="red"/>
  
  <!-- Direction vector b on line -->
  <line x1="240" y1="150" x2="310" y2="100" stroke="red" stroke-width="2"/>
  <polygon points="310,100 302,106 310,106" fill="red"/>
  <text x="275" y="130" font-size="13" fill="red" font-weight="bold">b</text>
  
  <!-- Normal vector n -->
  <line x1="200" y1="200" x2="200" y2="110" stroke="#2d8a2d" stroke-width="2.5"/>
  <polygon points="200,110 195,120 205,120" fill="#2d8a2d"/>
  <text x="205" y="160" font-size="14" fill="#2d8a2d" font-weight="bold">n</text>
  
  <!-- Angle θ (between line and plane) -->
  <path d="M 250,180 A 30 30 0 0 0 230,160" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="165" font-size="14" fill="#333" font-style="italic">θ</text>
  
  <!-- Angle α (between line and normal) -->
  <path d="M 210,150 A 30 30 0 0 0 235,130" fill="none" stroke="#888" stroke-width="1"/>
  <text x="218" y="140" font-size="13" fill="#888" font-style="italic">α</text>
  
  <!-- Right angle mark -->
  <rect x="195" y="185" width="8" height="8" fill="none" stroke="black" stroke-width="1"/>
  
  <text x="15" y="225" font-size="12" fill="#333">Plane</text>
</svg>