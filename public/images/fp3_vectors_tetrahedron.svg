<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Tetrahedron faces -->
  <polygon points="80,280 250,280 170,120" fill="#d4e6ff" opacity="0.4" stroke="black" stroke-width="1"/>
  <polygon points="80,280 170,120 130,180" fill="#ffe0e0" opacity="0.4" stroke="black" stroke-width="1"/>
  <polygon points="250,280 170,120 130,180" fill="#d4ffd4" opacity="0.4" stroke="black" stroke-width="1"/>
  <polygon points="80,280 250,280 130,180" fill="#fff3d4" opacity="0.3" stroke="black" stroke-width="1"/>
  
  <!-- Vectors -->
  <line x1="80" y1="280" x2="250" y2="280" stroke="blue" stroke-width="2.5"/>
  <polygon points="250,280 242,276 242,284" fill="blue"/>
  <text x="160" y="295" font-size="14" fill="blue" font-weight="bold">a</text>
  
  <line x1="80" y1="280" x2="170" y2="120" stroke="red" stroke-width="2.5"/>
  <polygon points="170,120 163,128 171,128" fill="red"/>
  <text x="118" y="200" font-size="14" fill="red" font-weight="bold">b</text>
  
  <line x1="80" y1="280" x2="130" y2="180" stroke="#2d8a2d" stroke-width="2.5"/>
  <polygon points="130,180 124,188 132,188" fill="#2d8a2d"/>
  <text x="95" y="230" font-size="14" fill="#2d8a2d" font-weight="bold">c</text>
  
  <text x="65" y="295" font-size="13" fill="#333">O</text>
</svg>