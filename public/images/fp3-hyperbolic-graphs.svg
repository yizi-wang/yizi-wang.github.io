<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -4 10 8" width="600" height="400">
  <rect width="100%" height="100%" fill="white"/>
  <line x1="-5" y1="0" x2="5" y2="0" stroke="#333" stroke-width="0.02"/>
  <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="0.02"/>
  <!-- sinh x -->
  <path d="M-3,-3.6 Q-2,-0.76 -1,-0.17 0,0 1,0.17 2,0.76 3,3.6" fill="none" stroke="blue" stroke-width="0.04"/>
  <text x="3.1" y="1.5" fill="blue" font-size="0.35">sinh x</text>
  <!-- cosh x -->
  <path d="M-3,3.6 Q-2,1.08 -1,1.54 0,2 1,1.54 2,1.08 3,3.6" fill="none" stroke="red" stroke-width="0.04"/>
  <text x="3.1" y="3.4" fill="red" font-size="0.35">cosh x</text>
  <!-- tanh x -->
  <path d="M-3.5,-0.96 Q-2,-0.96 -1,-0.76 0,0 1,0.76 2,0.96 3.5,0.96" fill="none" stroke="green" stroke-width="0.04"/>
  <text x="3.1" y="1" fill="green" font-size="0.35">tanh x</text>
  <!-- asymptote y=1 -->
  <line x1="-5" y1="1" x2="5" y2="1" stroke="#999" stroke-width="0.02" stroke-dasharray="0.1,0.1"/>
  <text x="4.2" y="1.15" fill="#999" font-size="0.3">y=1</text>
  <!-- axes labels -->
  <text x="4.8" y="-0.1" fill="#333" font-size="0.3">x</text>
  <text x="0.15" y="-3.8" fill="#333" font-size="0.3">y</text>
</svg>
