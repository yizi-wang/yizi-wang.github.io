<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Coordinate axes -->
  <line x1="30" y1="250" x2="370" y2="250" stroke="black" stroke-width="1.5" marker-end="url(#arrE)"/>
  <line x1="200" y1="380" x2="200" y2="20" stroke="black" stroke-width="1.5" marker-end="url(#arrE)"/>
  <text x="375" y="255" font-size="14" font-style="italic">x</text>
  <text x="188" y="15" font-size="14" font-style="italic">y</text>
  <!-- Transformed ellipse -->
  <ellipse cx="200" cy="250" rx="120" ry="60" fill="none" stroke="gray" stroke-width="1.5" stroke-dasharray="8,4" transform="rotate(-45, 200, 250)"/>
  <!-- Eigenvector v1 (blue, along y=x direction, eigenvalue 4) -->
  <line x1="200" y1="250" x2="340" y2="110" stroke="blue" stroke-width="2.5" marker-end="url(#arrE)"/>
  <text x="330" y="100" font-size="14" fill="blue" font-weight="bold">v₁</text>
  <!-- Transformed v1 (blue dashed, 4*v1) -->
  <line x1="200" y1="250" x2="380" y2="-10" stroke="blue" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrE)"/>
  <text x="365" y="0" font-size="14" fill="blue">Av₁ = 4v₁</text>
  <!-- Eigenvector v2 (red, along y=-x direction, eigenvalue 2) -->
  <line x1="200" y1="250" x2="300" y2="350" stroke="red" stroke-width="2.5" marker-end="url(#arrE)"/>
  <text x="305" y="360" font-size="14" fill="red" font-weight="bold">v₂</text>
  <!-- Transformed v2 (red dashed, 2*v2) -->
  <line x1="200" y1="250" x2="400" y2="450" stroke="red" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrE)"/>
  <text x="365" y="400" font-size="14" fill="red">Av₂ = 2v₂</text>
  <!-- Label -->
  <text x="60" y="375" font-size="14" font-weight="bold">Eigenvectors of A = (3 1; 1 3)</text>
  <defs>
    <marker id="arrE" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>
